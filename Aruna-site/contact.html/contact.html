<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | NeuroVerse AI</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#050505;
    color:white;
}

header{
    text-align:center;
    padding:60px;
    background:linear-gradient(135deg,#120024,#001f2e);
}

h1{
    color:#00d4ff;
}

.container{
    width:90%;
    max-width:700px;
    margin:auto;
    padding:40px 0;
}

form{
    background:#111;
    padding:30px;
    border-radius:15px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:20px;
    border:none;
    border-radius:10px;
}

button{
    background:#00d4ff;
    color:black;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    font-weight:bold;
    cursor:pointer;
}

.back-btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#00d4ff;
    color:black;
    text-decoration:none;
    border-radius:30px;
}
</style>

</head>
<body>

<header>
    <h1>Contact NeuroVerse AI</h1>
    <p>We would love to hear from you</p>
</header>

<div class="container">

<form>

<label>Your Name</label>
<input type="text" placeholder="Enter your name">

<label>Email Address</label>
<input type="email" placeholder="Enter your email">

<label>Message</label>
<textarea rows="6" placeholder="Write your message"></textarea>

<button type="submit">Send Message</button>

</form>

<a href="index.html" class="back-btn">⬅ Back to Home</a>

</div>

</body>
</html>
